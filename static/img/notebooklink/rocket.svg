  <defs id="defs7">
    <style>
      #float-wrapper {
        animation: rocket-float 3.8s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      #path5 {
        transform-box: fill-box;
        transform-origin: 50% 0%;
        animation: exhaust-pulse 0.9s ease-in-out infinite;
        animation-delay: -0.25s;
      }
      #path6 {
        animation: window-shimmer 2.6s ease-in-out infinite;
        animation-delay: -1.1s;
      }
      @keyframes rocket-float {
        0%, 100% { transform: translateY(0)    rotate(0deg);  }
        30%      { transform: translateY(-4px) rotate(0.7deg); }
        70%      { transform: translateY(-2px) rotate(-0.5deg); }
      }
      @keyframes exhaust-pulse {
        0%, 100% { transform: scale(1,    1);    opacity: 1;    }
        50%      { transform: scale(1.05, 1.09); opacity: 0.86; }
      }
      @keyframes window-shimmer {
        0%, 100% { fill: white; }
        50%      { fill: #b8d8f8; }
      }
    </style>
